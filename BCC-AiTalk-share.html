<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>AI Talk — Share Card 1200x630</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&display=swap" rel="stylesheet">
<style>
  /* Renders the og:image for BCC-AiTalk.html at exactly 1200x630.
     Screenshot this page (or use the headless-render command) to produce the PNG. */
  :root{
    --navy:#0a201c;
    --navy-2:#0e3b34;
    --blue:#0F7A6E;
    --teal:#15A99C;
    --amber:#FBB040;
    --gold:#FBB040;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .canvas{
    position:relative;width:1200px;height:630px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;color:#fff;
    background:
      radial-gradient(900px 420px at 82% -14%,rgba(21,169,156,.42),transparent 60%),
      radial-gradient(760px 420px at -8% 116%,rgba(19,181,166,.32),transparent 55%),
      linear-gradient(160deg,var(--navy) 0%,var(--navy-2) 100%);
  }
  /* the same double gold frame as the invitation */
  .canvas::before{
    content:"";position:absolute;inset:22px;
    border:2px solid rgba(251,176,64,.55);border-radius:4px;pointer-events:none;
  }
  .canvas::after{
    content:"";position:absolute;inset:29px;
    border:1px solid rgba(251,176,64,.28);border-radius:3px;pointer-events:none;
  }

  .brand{
    position:absolute;top:58px;left:0;right:0;
    display:inline-flex;align-items:center;justify-content:center;gap:12px;
    font-weight:700;letter-spacing:.02em;font-size:1.35rem;
  }
  .brand .logo{width:44px;height:44px;display:grid;place-items:center}
  .brand .logo svg{width:100%;height:100%;display:block}

  .eyebrow{
    text-transform:uppercase;letter-spacing:.44em;font-size:.95rem;font-weight:600;
    color:var(--gold);margin-bottom:20px;
  }
  .rule{width:78px;height:1px;background:var(--gold);opacity:.7;margin:0 auto 26px}

  .title .ai{display:block;font-size:7rem;font-weight:800;line-height:.92;letter-spacing:-.04em}
  .title .q{display:block;font-size:2.9rem;font-weight:700;line-height:1.1;letter-spacing:-.015em;margin-top:8px}
  .title .amp{color:var(--gold);font-style:italic}
  .sub{font-weight:500;font-size:1.5rem;color:#dbeae7;letter-spacing:.02em;margin-top:16px}

  .speakers{
    margin-top:26px;font-size:1.12rem;font-weight:500;color:#b9d6d1;letter-spacing:.02em
  }

  .meta{
    position:absolute;left:0;right:0;bottom:62px;
    display:flex;align-items:center;justify-content:center;gap:18px;
    font-weight:600;font-size:1.18rem;color:#fff;letter-spacing:.01em;
  }
  .meta .dot{width:5px;height:5px;border-radius:50%;background:var(--gold);opacity:.8}
</style>
</head>
<body>

<div class="canvas">
  <div class="brand">
    <span class="logo" aria-label="Bethel Citichurch">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img">
        <path d="M77.6,73.1 A36,36 0 1 1 77.6,26.9" fill="none" stroke="#ffffff" stroke-width="12"/>
        <path d="M66.5,61.5 A20,20 0 1 1 66.5,38.5" fill="none" stroke="#ffffff" stroke-width="7.5"/>
        <rect x="46.6" y="30" width="6.8" height="38" fill="#ffffff"/>
        <rect x="38" y="40" width="24" height="6.8" fill="#ffffff"/>
      </svg>
    </span>
    Bethel Citichurch
  </div>

  <div class="eyebrow">AI Talk</div>
  <div class="rule"></div>

  <h1 class="title">
    <span class="ai">AI</span>
    <span class="q">Ancaman atau <span class="amp">Peluang?</span></span>
  </h1>
  <div class="sub">Workshop:<br>Mengubah Ancaman Menjadi Peluang &amp; Otomatisasi Bisnis Kamu</div>

  <div class="speakers">Rudy Hartono &nbsp;·&nbsp; Yohanes Lim</div>

  <div class="meta">
    <span>Jumat, 24 Juli 2026</span>
    <span class="dot"></span>
    <span>18.30 WIB</span>
    <span class="dot"></span>
    <span>Jakarta Pusat</span>
  </div>
</div>

</body>
</html>
